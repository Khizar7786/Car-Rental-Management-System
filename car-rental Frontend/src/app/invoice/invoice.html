<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Invoices</h4>
    <button class="btn btn-primary" (click)="openForm()">
      + New Invoice
    </button>
  </div>

  <!-- LIST -->
  <div *ngIf="!showForm" class="card p-3 shadow-sm">

    <table class="table table-bordered table-hover">

      <thead>
        <tr>
          <th>Invoice No</th>
          <th>Customer</th>
          <th>Plate No</th>
          <th>Rate</th>
          <th>Period</th>
          <th>Total</th>
          <th>Status</th>
          <th width="280">Actions</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let inv of (invoices$ | async)">

          <td>{{ inv.invoiceNo }}</td>
          <td>{{ inv.customerName }}</td>
          <td>{{ inv.plateNo }}</td>
          <td>{{ inv.rate }}</td>
          <td>{{ inv.period }}</td>
          <td>{{ inv.totalAmount }}</td>
          <td>{{ inv.status }}</td>

          <td>

            <button
              class="btn btn-sm btn-primary me-2"
              (click)="editInvoice(inv)">

              Edit
            </button>

            <button
              class="btn btn-sm btn-success me-2"
              *ngIf="inv.status === 'Pending'"
              (click)="generateInvoice(inv.id)">

              Generate
            </button>

            <button
              class="btn btn-sm btn-warning me-2"
              *ngIf="inv.status === 'Generated'"
              (click)="markPaid(inv.id)">

              Paid
            </button>

            <button
              class="btn btn-sm btn-danger"
              *ngIf="inv.status === 'Pending'"
              (click)="deleteInvoice(inv.id)">

              Delete
            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

  <!-- FORM -->
  <div *ngIf="showForm" class="card shadow-sm p-4">

    <h5 class="mb-3">
      {{ isEdit ? 'Edit Invoice' : 'New Invoice' }}
    </h5>

    <form [formGroup]="invoiceForm" (ngSubmit)="saveInvoice()">

      <div class="row g-3">

        <div class="col-md-6">
          <label>Customer</label>

          <select
            class="form-select"
            formControlName="customerId">

            <option value="">Select Customer</option>

            <option
              *ngFor="let c of customers"
              [value]="c.id">

              {{ c.fullName }}

            </option>

          </select>
        </div>

        <div class="col-md-6">
          <label>Vehicle Id</label>

          <input
            type="number"
            class="form-control"
            formControlName="vehicleId">
        </div>

        <div class="col-md-6">
          <label>Agreement Id</label>

          <input
            type="number"
            class="form-control"
            formControlName="agreementId">
        </div>

        <div class="col-md-6">
          <label>Plate No</label>

          <input
            type="text"
            class="form-control"
            formControlName="plateNo">
        </div>

        <div class="col-md-6">
          <label>Rate</label>

          <input
            type="number"
            class="form-control"
            formControlName="rate">
        </div>

        <div class="col-md-6">
          <label>Start Date</label>

          <input
            type="date"
            class="form-control"
            formControlName="startDate">
        </div>

        <div class="col-md-6">
          <label>Period (Days)</label>

          <input
            type="number"
            class="form-control"
            formControlName="period">
        </div>

      </div>

      <div class="mt-4 d-flex justify-content-end gap-2">

        <button
          type="button"
          class="btn btn-secondary"
          (click)="closeForm()">

          Cancel
        </button>

        <button
          type="submit"
          class="btn btn-success">

          {{ isEdit ? 'Update' : 'Save' }}

        </button>

      </div>

    </form>

  </div>

</div>
