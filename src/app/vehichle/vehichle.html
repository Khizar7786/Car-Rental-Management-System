<div class="container mt-3">

  <!-- 🔹 Banner -->
  <div class="banner mb-4 p-4 text-center text-white rounded ">
    <h3>CAR RENTAL</h3>
    <p>Affordable Price • Wide Selection • 24/7 Support</p>
  </div>

  <!-- 🔹 Categories -->
<div class="d-flex flex-wrap gap-3 mb-4 justify-content-center">

  <button 
    class="btn btn-outline-primary"
    [class.active]="selectedType === 'all'"
    (click)="setFilter('all')">
    All Cars
  </button>

  <button 
    class="btn btn-outline-secondary"
    [class.active]="selectedType === 'hatchback'"
    (click)="setFilter('hatchback')">
    Hatchback
  </button>

  <button 
    class="btn btn-outline-secondary"
    [class.active]="selectedType === 'sedan'"
    (click)="setFilter('sedan')">
    Sedan
  </button>

  <button class="btn btn-outline-secondary">SUV</button>
  <button class="btn btn-outline-secondary">Bundles</button>

</div>

  <!-- 🔹 Title -->
  <h4 class="text-center mb-4">Car Rental Offers</h4>
  
  <!-- 🔹 Cards -->
  <div class="row g-4">

    <div class="col-md-6" *ngFor="let car of filteredCars">
      <div class="card shadow-sm p-2 d-flex flex-row align-items-center">

        <!-- Car Image -->
        <img [src]="car.image" class="car-img me-3" alt="car">

        <!-- Details -->
        <div class="flex-grow-1">
          <p class="mb-1 text-muted">Get Your Car Now</p>
          <h6 class="fw-bold">{{car.name}}</h6>
          <p class="mb-1">Per Day Price <b class="text-primary">{{car.price}}</b></p>
          <small class="text-muted">Limited time offer</small>
        </div>

        <!-- Button -->
        <button class="btn btn-warning btn-sm">View</button>

      </div>
    </div>

  </div>
</div>
