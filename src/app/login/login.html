<div class="login-wrapper d-flex justify-content-center align-items-center vh-100 bg-light mb-3">

  <div class="card shadow p-4 login-card">

    <!-- Header -->
    <div class="text-center mb-3">
      <h4 class="fw-bold">Login</h4>
      <p class="text-muted mb-0">Car Rental Management System</p>
    </div>

    <hr />

    <!-- Form -->
    <form (ngSubmit)="onLogin()">

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input 
          type="email" 
          class="form-control" 
          [(ngModel)]="email"
          name="email"
          placeholder="Enter email"
          required />
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input 
          type="password" 
          class="form-control" 
          [(ngModel)]="password"
          name="password"
          placeholder="Enter password"
          required />
      </div>

      <!-- Remember -->
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="rememberMe">
        <label class="form-check-label" for="rememberMe">
          Remember me
        </label>
      </div>

      <!-- Button -->
      <button class="btn btn-primary w-100" type="submit">
        Login
      </button>

    </form>

  </div>

</div>
